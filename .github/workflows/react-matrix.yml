name: react-matrix
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react: ['18.3.1', '19.0.0']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Pin React ${{ matrix.react }}
        run: npm install --no-save react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - run: npm run typecheck
      - run: npm test
